name: flutter_streetphare
description: "StreetPhare — Application de cartographie collaborative citoyenne décentralisée."
publish_to: 'none'

version: 1.2.0+2

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Cartographie OpenStreetMap
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Cache des tuiles de la carte (7 jours)
  flutter_map_cache: ^1.4.0

  # Stockage local (SharedPreferences)
  shared_preferences: ^2.3.2

  # Géolocalisation GPS
  geolocator: ^13.0.1

  # Requêtes HTTP (OSRM / GraphHopper routing)
  http: ^1.2.2

  # === Architecture réseau StreetPhare (ruche décentralisée) ===
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Cryptographie pure-Dart
  cryptography: ^2.7.0

  # Bluetooth Low Energy (mesh courte portée)
  flutter_reactive_ble: ^5.0.3

  # Wi-Fi Direct / Nearby
  nearby_connections: ^4.1.0

  # WebSocket pour le transport relay
  web_socket_channel: ^3.0.3

  # Lancement d'URLs système
  url_launcher: ^6.3.0

  # Scanner de QR Code
  mobile_scanner: ^6.0.0

  # Notifications locales (service persistant + alertes)
  flutter_local_notifications: ^18.0.1

  # Gestion des permissions (arrière-plan, batterie)
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
